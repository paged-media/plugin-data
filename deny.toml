# cargo-deny configuration for paged.data.
# Run:  cargo deny check          (CI runs `check licenses bans sources`)
#
# This doubles as the SDK-only rule's Rust half (spec §2.1 / §4 dep rule
# 3): [sources] denies unknown registries/git, so a path/git reach-around
# into core/editor internals — or into another plugin — cannot land
# silently. The §3 license-boundary gate is ENFORCED here too: only
# permissive licenses are allowed, so a source-available/ELv2/SSPL data
# engine cannot be pulled in (it would fail the [licenses] allow-list).
# Apache-2.0 is allowed for the Arrow interchange line (arrow-rs lands at
# the M1 Arrow-IPC seam); MIT covers the vendored DuckDB-WASM artifact
# (vendored as a built artifact, NOT compiled in-tree — see vendor/).

[advisories]
version = 2
ignore = [
    # `paste` (proc-macro, pulled in via boa_engine) is UNMAINTAINED, not
    # vulnerable — RUSTSEC-2024-0436 is informational. Pre-existing; revisit
    # when boa moves off it. No license/security boundary impact.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.9
# Dependencies must be permissively licensed so they can be combined into
# an MPL distribution (same posture as core). NO source-available / ELv2 /
# SSPL engine can pass this gate (spec §3).
allow = [
    "MPL-2.0",
    # Our own workspace crates: dual MPL-2.0 OR PMEL (SPDX has no id for
    # PMEL, hence the LicenseRef form).
    "LicenseRef-PMEL",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

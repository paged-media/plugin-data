# paged.data feature registry — print automation / batch generation (spec §10,
# data.automation.*). The batch-PLAN engine (partition a result into per-record /
# per-group / one-catalog generation units) is built + tested; the napi-rs native
# execution binding + the Boa scripting surface are the remaining T2 work.

- id: data.automation.batch
  title: Batch plan — partition a result into per-record / per-group / one-catalog generation units (§10)
  spec: plugin-data data-automation/src/lib.rs (base-idea §10, D-7)
  status: implemented
  provenance:
    [
      "plans WHICH records feed WHICH document over the stabilized result (deterministic/permutation-invariant); the executor lowers each unit through the normal pipeline — nothing renders here (§10)",
    ]
  tests:
    rust: ["data-conformance/tests/automation.rs::data_automation_batch"]

- id: data.automation.run
  title: Batch run — execute a plan per-document (resolve + paginate each unit, §10)
  spec: plugin-data data-js/src/core.rs (base-idea §10, D-7)
  status: implemented
  provenance:
    [
      "partitions the RESOLVED flow by mode (per-record/per-group/one-catalog) + paginates each unit through the same data-lower path the live doc uses; nothing renders here (executor, not renderer)",
    ]
  tests:
    rust: ["data-conformance/tests/batch_run.rs::data_automation_run"]

- id: data.automation.native
  title: Native (napi-rs) batch execution — drive a batch run server/CI without a browser (§10)
  spec: plugin-data data-automation (base-idea §10, D-7 — M2)
  status: planned

- id: data.automation.script
  title: Constrained Boa scripting surface for scriptable queries/builds (§10)
  spec: plugin-data data-automation (base-idea §10 — capability-gated, M2)
  status: planned

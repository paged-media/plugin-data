# paged.data feature registry — binding + synchronization engine (spec §8,
# §12.3 data.bind.*).

- id: data.bind.resolve-variable
  title: Resolve a variable binding (expression over a record -> formatted value)
  spec: plugin-data data-bind/src/lib.rs (base-idea §9.1)
  status: implemented
  provenance: ["own code; eval via data-expr"]
  tests:
    rust: ["data-conformance/tests/bind.rs::data_bind_resolve_variable"]

- id: data.bind.preview-step
  title: Record-preview stepper — resolve a binding against a chosen record index N (§9)
  spec: plugin-data data-bind/src/lib.rs (base-idea §9 record-preview affordance)
  status: implemented
  provenance:
    [
      "resolve_at(binding, record) evaluates per-record kinds (variable/image/barcode) over records[record] instead of always row 0; resolve()=resolve_at(0); record_count(query) is the stepper's of-N bound; an out-of-range index degrades to the missing policy (no panic); whole-result kinds (table/flow) ignore the index and render in full; the SAME resolve+lower lanes the batch uses, so preview == output",
      "bundle: session.recordCount(query) + session.previewRecord(binding, record) drive a prev/next/jump stepper in the bindings panel; previewRecord commits through the normal lower lanes (variable field re-set, image place, barcode re-encode via lower_barcode_at) and falls back to the record-0 resolve on an engine wasm predating the lane",
    ]
  tests:
    rust: ["data-conformance/tests/bind.rs::data_bind_preview_step_record"]
    vitest: ["packages/data-bundle/src/__tests__/preview.test.ts"]

- id: data.bind.field-mapping
  title: Field-mapping wizard — map the source's columns → variable bindings one-click (§9)
  spec: plugin-data data-bind/src/mapping.rs + data-expr/src/lib.rs (is_field_ident) (base-idea §9 first-run import affordance)
  status: implemented
  provenance:
    [
      "suggest_mappings(schema) is a pure schema -> ColumnMapping[] kernel: one row per result column with a humanised header (unit_price -> Unit Price), the bound expression = the bare field reference, the logical type hint, and a mappable flag; mappability is data-expr::is_field_ident (the DSL grammar mirror) — the DSL has NO quoted/bracketed field syntax, so a column whose name is not a bare identifier (space/punctuation/leading digit/reserved TRUE/FALSE/NULL) is flagged non-mappable with an empty expr (the wizard asks for a manual expression, never invents a quoting grammar)",
      "bundle: session.queryMappings(query) returns the suggestions; the field-mapping wizard panel renders the header -> binding mapping UI and, on confirm, generates each variable binding from the engine-computed expr (the data semantics stay in Rust; the bundle never decides the mapping)",
    ]
  tests:
    rust: ["data-conformance/tests/mapping.rs::data_bind_field_mapping"]
    vitest: ["packages/data-bundle/src/__tests__/mapping.test.ts"]


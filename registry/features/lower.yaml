# paged.data feature registry — placeholder lowering (spec §9, §12.3
# data.lower.*). M0 implements variable + single-region table; image,
# record-flow, and rules are M1.

- id: data.lower.variable
  title: Variable replacement (resolved display at a tagged placeholder)
  spec: plugin-data data-lower/src/lib.rs (base-idea §9.1)
  status: implemented
  provenance: ["pure model->IR; anchor survives, content updates"]
  tests:
    rust: ["data-conformance/tests/lower.rs::data_lower_variable"]

- id: data.lower.table
  title: Single-region dynamic table (degraded to tab-text + drawn rules, D-02)

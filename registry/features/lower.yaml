# paged.data feature registry — placeholder lowering (spec §9, §12.3
# data.lower.*). M0 implements variable + single-region table; image,
# record-flow, and rules are M1.

- id: data.lower.variable
  title: Variable replacement (resolved display at a tagged placeholder)
  spec: plugin-data data-lower/src/lib.rs (base-idea §9.1)
  status: implemented
  provenance: ["pure model->IR; anchor survives, content updates"]
  tests:
    rust: ["data-conformance/tests/lower.rs::data_lower_variable"]

- id: data.lower.table
  title: Single-region dynamic table (degraded to tab-text + drawn rules, D-02)
  spec: plugin-data data-lower/src/lib.rs (base-idea §9.3, §2.2)
  status: implemented
  provenance: ["no insertTable op yet -> §2.2 degradation, like sheet S-03"]
  tests:
    rust: ["data-conformance/tests/lower.rs::data_lower_table"]

- id: data.lower.image
  title: Image placeholder (field -> classified reference + placement IR, §9.2)
  spec: plugin-data data-lower/src/lib.rs (base-idea §9.2)
  status: implemented
  provenance: ["lower_image packages the reference + fit + status; placed via the core asset mechanism, never plugin-image (§2.1); host placement op is the D-14 gap"]
  tests:
    rust: ["data-conformance/tests/image.rs::data_lower_image"]

- id: data.lower.recordflow
  title: Record flow — template instancing + grouping over a frame chain (§9.4)
  spec: plugin-data data-bind + data-lower (base-idea §9.4 — the catalog engine)
  status: implemented
  provenance: ["grouped template instances; atomic records; stable order; paginator built ahead of the SDK frame-chain door (D-12), like sheet S-05"]
  tests:
    rust: ["data-conformance/tests/recordflow.rs::data_lower_paginate"]

- id: data.lower.pagination
  title: Pagination convergence — repeated/continued headers, tall-record handling
  spec: plugin-data data-lower/src/lib.rs (base-idea §9.4)
  status: implemented
  provenance: ["greedy atomic packing; single bounded pass converges even for a record taller than a frame; order-preserving (property tested)"]
  tests:
    rust: ["data-conformance/tests/recordflow.rs::data_recordflow_pagination"]

- id: data.lower.table-native
  title: Native table lowering (insertTable + per-cell insertText; D-02 retired)
  spec: plugin-data packages/data-host-model (base-idea §9.3, D-02)
  status: implemented
  provenance: ["consumes the landed insertTable op; pure tableInsertSpec/tableCellInserts translation; tab-text+rules retained as fallback"]
  tests:
    vitest: ["packages/data-host-model/src/__tests__/lower.test.ts"]

- id: data.lower.rule
  title: Data-driven formatting rules (when -> document style, §9.5)
  spec: plugin-data data-lower (base-idea §9.5, D-13)
  status: planned

  status: implemented
  provenance: ["no insertTable op yet -> §2.2 degradation, like sheet S-03"]
  tests:
    rust: ["data-conformance/tests/lower.rs::data_lower_table"]

- id: data.lower.image
  title: Image placeholder (field -> asset via the core asset mechanism, §9.2)
  spec: plugin-data data-lower (base-idea §9.2, D-02b)
  status: planned

- id: data.lower.recordflow
  title: Record flow + template instancing + grouping + pagination (§9.4)

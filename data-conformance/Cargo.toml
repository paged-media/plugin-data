data-sources = { path = "../data-sources" }
data-query = { path = "../data-query" }
data-bind = { path = "../data-bind" }
data-lower = { path = "../data-lower" }
data-js = { path = "../data-js" }
serde.workspace = true
serde_yaml.workspace = true
serde_json.workspace = true

[dev-dependencies]
proptest.workspace = true

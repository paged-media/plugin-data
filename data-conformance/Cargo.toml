[package]
name = "data-conformance"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "paged.data conformance harness (spec §12): the coverage gate + property/security tests. TEST-ONLY — never a ship dependency (cargo tree proves no test code reaches the wasm release build)."

[lints]
workspace = true

[[bin]]
name = "coverage-gate"
path = "src/bin/coverage_gate.rs"

[dependencies]
data-core = { path = "../data-core" }
